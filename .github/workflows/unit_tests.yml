name: Unit Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest coverage

      - name: Determine output folder
        id: set_output_folder
        run: |
          if [[ $GITHUB_EVENT_NAME == "pull_request" ]]; then
            branch_name=$GITHUB_BASE_REF
          else
            branch_name=$GITHUB_REF_NAME
          fi

          if [[ $branch_name == "main" ]]; then
            echo "output_folder=prod" >> $GITHUB_ENV
          elif [[ $branch_name == "develop" ]]; then
            echo "output_folder=dev" >> $GITHUB_ENV
          else
            echo "Unknown branch: $branch_name"
            exit 1
          fi

      - name: Run tests with coverage
        run: |
          timestamp=$(date '+%Y-%m-%d_%H-%M-%S')
          mkdir -p test_results
          log_file="test_results/${timestamp}_python${{ matrix.python-version }}_report.log"

          echo -e "\nTest Cases Report\n" >> "$log_file"
          coverage run -m pytest >> "$log_file" 2>&1

          echo -e "\nCoverage Report\n" >> "$log_file"
          coverage report >> "$log_file"

      - name: Check coverage
        run: |
          coverage report --fail-under=90

      - name: Upload report to Azure
        uses: LanceMcCarthy/Action-AzureBlobUpload@v2
        with:
          source_folder: "test_results"
          destination_folder: "${{ env.output_folder }}"
          connection_string: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          container_name: "osw-sanitizer-package"
          clean_destination_folder: false
          delete_if_exists: false
